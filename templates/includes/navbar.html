{% load static %}
<!-- Main header start -->
<header class="main-header sticky-header header-with-top">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light">
      <a class="navbar-brand company-logo" href="{% url 'home' %}">
        <img src="{% static 'img/logos/black-logo.png' %}" alt="logo" />
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbar"
        aria-controls="navbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="fa fa-bars"></span>
      </button>
      <div class="navbar-collapse collapse w-100" id="navbar">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a 
            {% if '/' == request.path %}
              class="nav-link active"
            {% else %}
              class="nav-link"
            {% endif %}
              href="{% url 'home' %}">Home</a>
          </li>
          <!-- <li class="nav-item">
            <a 
            {% if 'cars' in request.path %}
              class="nav-link active"
            {% else %}
              class="nav-link"
            {% endif %}
            href="{% url 'cars' %}"> Cars </a>
          </li> -->
          <li class="nav-item">
              <a href="{% url 'cars' %}"
                class="nav-link 
                {% if request.resolver_match.url_name == 'cars' %}
                    active
                {% endif %}">
                  Cars
              </a>
          </li>
          <li class="nav-item">
              <a href="{% url 'about' %}"
                class="nav-link 
                {% if request.resolver_match.url_name == 'about' %}
                    active
                {% endif %}">
                  About
              </a>
          </li>
          <li class="nav-item">
              <a href="{% url 'services' %}"
                class="nav-link 
                {% if request.resolver_match.url_name == 'services' %}
                    active
                {% endif %}">
                  Services
              </a>
          </li>
          <li class="nav-item">
              <a href="{% url 'contact' %}"
                class="nav-link 
                {% if request.resolver_match.url_name == 'contact' %}
                    active
                {% endif %}">
                  Contact
              </a>
          </li>
           <!-- <li class="nav-item dropdown m-hide">
            <a href="#full-page-search" class="nav-link h-icon">
              <i class="fa fa-search"></i>
            </a>
          </li> -->
          <li class="nav-item dropdown m-hide">
              <a href="#full-page-search"
                class="nav-link h-icon 
                {% if request.resolver_match.url_name == 'search' %}
                    active
                {% endif %}">
                  <i class="fa fa-search"></i>
              </a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</header>
<!-- Main header end -->
